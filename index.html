<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La página del Tonas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            padding-top: 0;
        }

        section {
            margin-top: 60px;
            margin-bottom: 60px;
        }

        /* Navbar */
        .nav-link:hover {
            text-decoration: underline;
        }

        /* Carousel */
        .carousel-item img {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        @media (min-width: 992px) {
            .carousel-item img {
                aspect-ratio: 21 / 9;
            }
        }

        @media (max-width: 576px) {
            .carousel-item img {
                aspect-ratio: 4 / 3;
            }
        }

        .carousel-caption {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 10px;
            animation: fadeIn 1s ease-in-out;
        }

        .carousel-caption h2,
        .carousel-caption p {
            color: white;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
        }

        /* Cards */
        .card {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Carousel spacing */
        .carousel {
            margin-top: 0;
        }

        /* Botón scroll top */
        #btnTop {
            display: none;
            z-index: 1000;
        }

        /* Animación */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md bg-success navbar-dark fixed-top padding-bottom-5">
    <div class="container-fluid">
        <a class="navbar-brand" href="https://recetas-del-tonas.vercel.app/">LAS RECETAS DEL TONAS</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="recipes.html">RECETAS</a></li>
                <li class="nav-item"><a class="nav-link" href="photos.html">FOTOS</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CARRUSEL -->
<div id="carouselExample" class="carousel slide carousel-fade">

    <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="3"></button>
    </div>

    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="img/tarta queso.jpg" class="d-block w-100" alt="Tarta de queso casera">
            <div class="carousel-caption">
                <h2>Tarta de queso</h2>
                <p>Cremosa y casera</p>
            </div>
        </div>

        <div class="carousel-item">
            <img src="img/galletas-mantequilla.jpg" class="d-block w-100" alt="Galletas de mantequilla">
            <div class="carousel-caption">
                <h2>Galletas de mantequilla</h2>
                <p>Las favoritas de Aceituna</p>
            </div>
        </div>

        <div class="carousel-item">
            <img src="img/galletas.jpg" class="d-block w-100" alt="Galletas con chocolate">
            <div class="carousel-caption">
                <h2>Galletas con chocolate</h2>
                <p>Perfectas para merendar</p>
            </div>
        </div>

        <div class="carousel-item">
            <img src="img/tarta turron.jpg" class="d-block w-100" alt="Tarta de turrón">
            <div class="carousel-caption">
                <h2>Tarta de turrón</h2>
                <p>Ideal para Navidad</p>
            </div>
        </div>
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
        <span class="visually-hidden">Anterior</span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
        <span class="visually-hidden">Siguiente</span>
    </button>

</div>


<!-- FOOTER -->
<footer>
    <div class="container-fluid bg-dark p-5 text-center text-white">
        <div class="row">
            <div class="col">
                <a href="#" class="text-decoration-none text-success">
                    <i class="bi bi-person-wheelchair"></i> ACEITUNA <i class="bi bi-person-wheelchair"></i>
                </a>
            </div>
            <div class="col">
                <a href="#" class="text-decoration-none text-success">CONTACTO</a>
            </div>
            <div class="col">
                <a href="#" class="text-decoration-none text-success">DESCARGAS</a>
            </div>
        </div>
    </div>
</footer>

<!-- BOTÓN VOLVER ARRIBA -->
<button id="btnTop" class="btn btn-success position-fixed bottom-0 end-0 m-4">
    ↑
</button>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const btnTop = document.getElementById("btnTop");

    window.onscroll = function () {
        if (document.documentElement.scrollTop > 200) {
            btnTop.style.display = "block";
        } else {
            btnTop.style.display = "none";
        }
    };

    btnTop.onclick = function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
</script>

</body>
</html>
