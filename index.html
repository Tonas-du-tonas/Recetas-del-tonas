<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La pagina del Tonas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Imagenes del carrusel responsive */
        .carousel-item img {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        /* Ajustes para pantallas grandes */
        @media (min-width: 992px) {
            .carousel-item img {
                aspect-ratio: 21 / 9;
            }
        }

        /* Ajustes para móviles */
        @media (max-width: 576px) {
            .carousel-item img {
                aspect-ratio: 4 / 3;
            }
        }

        /* Caption mejor legible */
        .carousel-caption {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
        }

        .carousel-caption h2,
        .carousel-caption p {
            text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
            color: white;
        }
    </style>
</head>

<body>

<!-- MENU -->
<nav class="navbar navbar-expand-md bg-success">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">LAS RECETAS DEL TONAS</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#">INICIO</a></li>
                <li class="nav-item"><a class="nav-link" href="#">RECETAS</a></li>
                <li class="nav-item"><a class="nav-link" href="#">FOTOS</a></li>
                <li class="nav-item"><a class="nav-link">CONTACTO</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CARRUSEL -->
<div id="carouselExample" class="carousel slide">

    <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
    </div>

    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="img/tarta queso.jpg" class="d-block w-100" alt="Tarta de queso">
            <div class="carousel-caption">
                <h2>Tarta de queso</h2>
                <p>Cremosa y casera</p>
            </div>
        </div>

        <div class="carousel-item">
            <img src="img/galletas.jpg" class="d-block w-100" alt="Galletas">
            <div class="carousel-caption">
                <h2>Galletas con pepitas de chocolate</h2>
                <p>Perfectas para merendar</p>
            </div>
        </div>

        <div class="carousel-item">
            <img src="img/tarta turron.jpg" class="d-block w-100" alt="Tarta de turrón">
            <div class="carousel-caption">
                <h2>Tarta de turrón</h2>
                <p>Ideal para Navidad</p>
            </div>
        </div>

    </div>

    <!-- Controles -->
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

    </div>


    <!-- Contenedores -->    
    <div class="container-fluid bg-light">
        aa
    </div>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
